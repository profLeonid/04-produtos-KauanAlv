<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="./main.js" defer></script>
    <title>Produtos</title>
</head>

<body class="bg-gray-200 flex flex-col items-center justify-center h-screen gap-6">
    <h1 class="text-3xl">Lista Produtos</h1>

    
    <div>
    <p class="text-white text-center bg-orange-600 rounded-t-lg">Código</p>
    <input
        type="text"
        class="border px-4 py-2 rounded-b-lg"
        id="codigo"
    >
    </div>

    <div>
        <p class="text-white text-center bg-orange-600 rounded-t-lg">Produto</p>
        <input
        type="text"
        class="border px-4 py-2 rounded-b-lg"
        id="produto"
    >
    </div>

    <div>
        <p class="text-white text-center bg-orange-600 rounded-t-lg">Quantidade</p>
        <input
        type="text"
        class="border px-4 py-2 rounded-b-lg"
        id="quantidade"
    >
    </div>

    <button
        class="text-white bg-orange-600 px-4 py-2 rounded"
        onclick="adicionarProduto()"
    >
        Adicionar
    </button>
    <div
        class="flex flex-col gap-2"
        id="lista"
    ></div>

</body>
</html>
